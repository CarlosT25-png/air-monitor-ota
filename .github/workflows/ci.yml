name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM GCC
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: 14.3.Rel1

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          pip install cbor2 click intelhex

      - name: Prepare local configuration
        run: cp Components/esp32-at/Inc/configuration.h.example Components/esp32-at/Inc/configuration.h

      - name: Configure
        run: cmake --preset Release

      - name: Build
        run: cmake --build build/Release

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-release
          retention-days: 7
          path: |
            build/Release/air-monitor-ota.signed.bin
            build/Release/air-monitor-ota-ota.signed.bin
            build/Release/air-monitor-ota.bin
            build/Release/bootloader/mcuboot.bin
